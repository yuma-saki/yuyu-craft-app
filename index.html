<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="勤怠・日報">
  <title>勤怠・日報 | ゆうゆうクラフト</title>
  <meta name="app-version" content="v10">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* Header */
    .header {
      background: white;
      padding: 16px 20px 12px;
      border-bottom: 1px solid #e5e5e7;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header-time { font-size: 15px; color: #6e6e73; font-variant-numeric: tabular-nums; }

    /* Tabs */
    .tab-bar {
      display: flex;
      background: white;
      border-bottom: 1px solid #e5e5e7;
      position: sticky;
      top: 57px;
      z-index: 9;
    }
    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      color: #6e6e73;
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab.active { color: #007aff; border-bottom-color: #007aff; font-weight: 700; }

    /* Pages */
    .page { display: none; padding: 20px; }
    .page.active { display: block; }

    /* Cards */
    .card {
      background: white;
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #6e6e73;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }

    /* Today date */
    .today-date {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    /* Time display */
    .time-grid {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .time-block { flex: 1; text-align: center; }
    .time-label { font-size: 12px; color: #6e6e73; margin-bottom: 6px; }
    .time-value {
      font-size: 30px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #1d1d1f;
    }
    .time-value.empty { color: #c7c7cc; }
    .time-arrow { color: #c7c7cc; font-size: 18px; padding-top: 18px; }
    .time-hours { font-size: 18px; }
    .time-edit-btn {
      display: block;
      margin: 6px auto 0;
      padding: 3px 10px;
      background: #f2f2f7;
      border: none;
      border-radius: 8px;
      font-size: 11px;
      color: #007aff;
      cursor: pointer;
      font-weight: 500;
    }

    /* Time picker modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-sheet {
      background: white;
      width: 100%;
      border-radius: 20px 20px 0 0;
      padding: 24px 24px 40px;
    }
    .modal-title {
      font-size: 17px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 20px;
    }
    .time-input {
      width: 100%;
      padding: 16px;
      font-size: 32px;
      font-weight: 700;
      text-align: center;
      border: 1.5px solid #e5e5e7;
      border-radius: 14px;
      outline: none;
      font-variant-numeric: tabular-nums;
      margin-bottom: 16px;
    }
    .time-input:focus { border-color: #007aff; }
    .modal-btn-row { display: flex; gap: 10px; }
    .modal-btn {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .modal-btn-cancel { background: #f2f2f7; color: #1d1d1f; }
    .modal-btn-ok     { background: #007aff; color: white; }

    /* Buttons */
    .btn-row { display: flex; gap: 12px; }
    .btn {
      flex: 1;
      padding: 20px 12px;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
      letter-spacing: 0.3px;
    }
    .btn:active { transform: scale(0.97); opacity: 0.85; }
    .btn:disabled { opacity: 0.28; cursor: not-allowed; transform: none; }
    .btn-in  { background: #34c759; color: white; }
    .btn-out { background: #ff3b30; color: white; }

    /* Break toggle */
    .break-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid #f2f2f7;
    }
    .break-label { font-size: 14px; color: #3a3a3c; font-weight: 500; }
    .break-toggle {
      display: flex;
      background: #f2f2f7;
      border-radius: 10px;
      padding: 3px;
      gap: 3px;
    }
    .break-btn {
      padding: 7px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: #6e6e73;
      transition: all 0.15s;
    }
    .break-btn.active {
      background: white;
      color: #1d1d1f;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    /* Report */
    .report-hint {
      font-size: 13px;
      color: #aeaeb2;
      margin-bottom: 10px;
    }
    .report-textarea {
      width: 100%;
      min-height: 130px;
      border: 1.5px solid #e5e5e7;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 16px;
      font-family: inherit;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.6;
    }
    .report-textarea:focus { border-color: #007aff; }

    .btn-save {
      width: 100%;
      margin-top: 14px;
      padding: 18px;
      background: #007aff;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-save:active { opacity: 0.8; }

    .saved-report-text {
      font-size: 15px;
      line-height: 1.7;
      white-space: pre-wrap;
      color: #3a3a3c;
    }
    .btn-edit {
      margin-top: 14px;
      padding: 10px 18px;
      background: #f2f2f7;
      color: #007aff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Monthly summary */
    .summary-row { display: flex; gap: 12px; margin-bottom: 16px; }
    .summary-card {
      flex: 1;
      background: white;
      border-radius: 14px;
      padding: 18px 12px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .summary-num { font-size: 32px; font-weight: 700; color: #007aff; }
    .summary-unit { font-size: 14px; font-weight: 600; color: #007aff; }
    .summary-label { font-size: 12px; color: #6e6e73; margin-top: 4px; }

    /* Record list */
    .record-item {
      background: white;
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .record-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .record-date { font-size: 14px; font-weight: 700; }
    .record-hours { font-size: 13px; color: #6e6e73; }
    .record-times { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: #3a3a3c; }
    .record-report { font-size: 13px; color: #6e6e73; white-space: pre-wrap; line-height: 1.6; }
    .no-report { font-size: 13px; color: #ff9500; }

    /* Export buttons */
    .export-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
      transition: opacity 0.15s;
    }
    .export-btn:active { opacity: 0.8; }
    .export-invoice { background: #5856d6; color: white; }
    .export-json    { background: #34c759; color: white; }
    .export-save    { background: #ff9500; color: white; }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 50px 20px;
      color: #c7c7cc;
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 15px; }

    /* Month nav */
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .month-nav-btn {
      background: white;
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .month-label { font-size: 20px; font-weight: 700; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30,30,30,0.85);
      color: white;
      padding: 12px 22px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.25s;
      white-space: nowrap;
      backdrop-filter: blur(8px);
    }
    .toast.show { opacity: 1; }

    .section-label {
      font-size: 13px;
      font-weight: 600;
      color: #6e6e73;
      margin: 20px 0 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Past record edit button */
    .record-edit-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 12px;
      background: #f2f2f7;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      color: #007aff;
      font-weight: 600;
      cursor: pointer;
    }
    .record-edit-btn:active { opacity: 0.7; }

    /* Edit modal extras */
    .edit-field-label {
      font-size: 13px;
      font-weight: 600;
      color: #6e6e73;
      margin-bottom: 6px;
      margin-top: 14px;
    }
    .edit-break-toggle {
      display: flex;
      background: #f2f2f7;
      border-radius: 10px;
      padding: 3px;
      gap: 3px;
    }
    .edit-break-btn {
      flex: 1;
      padding: 7px 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: #6e6e73;
      transition: all 0.15s;
    }
    .edit-break-btn.active {
      background: white;
      color: #1d1d1f;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }
    .edit-report-textarea {
      width: 100%;
      min-height: 100px;
      border: 1.5px solid #e5e5e7;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 15px;
      font-family: inherit;
      resize: vertical;
      outline: none;
      line-height: 1.6;
    }
    .edit-report-textarea:focus { border-color: #007aff; }

    /* Update banner */
    .update-banner {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #007aff;
      color: white;
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 600;
      z-index: 200;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .update-banner.show { display: flex; }
    .update-btn {
      background: white;
      color: #007aff;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<!-- Update banner -->
<div class="update-banner" id="updateBanner">
  <span>🆕 新しいバージョンがあります</span>
  <button class="update-btn" onclick="applyUpdate()">今すぐ更新</button>
</div>

<div class="header">
  <h1>🔨 ゆうゆうクラフト</h1>
  <span class="header-time" id="headerTime"></span>
</div>

<div class="tab-bar">
  <button class="tab active" onclick="switchTab('today')">📅 今日</button>
  <button class="tab" onclick="switchTab('monthly')">📊 月次</button>
</div>

<!-- TODAY -->
<div id="page-today" class="page active">

  <div class="card">
    <div class="card-title">今日の勤怠</div>
    <div class="today-date" id="todayDate"></div>

    <div class="time-grid">
      <div class="time-block">
        <div class="time-label">出勤</div>
        <div class="time-value empty" id="dispIn">--:--</div>
        <button class="time-edit-btn" onclick="openTimePicker('in')">✏️ 修正</button>
      </div>
      <div class="time-arrow">→</div>
      <div class="time-block">
        <div class="time-label">退勤</div>
        <div class="time-value empty" id="dispOut">--:--</div>
        <button class="time-edit-btn" onclick="openTimePicker('out')">✏️ 修正</button>
      </div>
      <div class="time-arrow">｜</div>
      <div class="time-block">
        <div class="time-label">勤務</div>
        <div class="time-value empty time-hours" id="dispHours">--</div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-in"  id="btnIn"  onclick="clockIn()">🟢 出勤</button>
      <button class="btn btn-out" id="btnOut" onclick="clockOut()" disabled>🔴 退勤</button>
    </div>

    <div class="break-row">
      <span class="break-label">🍱 昼休憩</span>
      <div class="break-toggle">
        <button class="break-btn active" id="breakOn"  onclick="setBreak(true)">あり（1時間）</button>
        <button class="break-btn"        id="breakOff" onclick="setBreak(false)">なし</button>
      </div>
    </div>
  </div>

  <!-- Time picker modal -->
  <div class="modal-overlay" id="timeModal">
    <div class="modal-sheet">
      <div class="modal-title" id="modalTitle">時刻を設定</div>
      <input type="time" class="time-input" id="timePickerInput">
      <div class="modal-btn-row">
        <button class="modal-btn modal-btn-cancel" onclick="closeTimePicker()">キャンセル</button>
        <button class="modal-btn modal-btn-ok"     onclick="confirmTimePicker()">設定する</button>
      </div>
    </div>
  </div>

  <!-- Report form (after clock-out) -->
  <div class="card" id="reportFormCard" style="display:none;">
    <div class="card-title">📝 今日の日報</div>
    <div class="report-hint">物件名・作業内容・量を入力（改行で複数OK）</div>
    <textarea class="report-textarea" id="reportInput"
      placeholder="例：A物件  建具取付  3枚&#10;B物件  棚板加工  5枚&#10;B物件  金物調整"></textarea>
    <button class="btn-save" onclick="saveReport()">💾 記録する</button>
  </div>

  <!-- Report saved view -->
  <div class="card" id="reportSavedCard" style="display:none;">
    <div class="card-title">📝 今日の日報</div>
    <div class="saved-report-text" id="reportSavedText"></div>
    <button class="btn-edit" onclick="editReport()">✏️ 編集</button>
  </div>

</div>

<!-- MONTHLY -->
<div id="page-monthly" class="page">

  <div class="month-nav">
    <button class="month-nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="month-nav-btn" onclick="changeMonth(1)">›</button>
  </div>

  <div class="summary-row">
    <div class="summary-card">
      <div><span class="summary-num" id="totalDays">0</span><span class="summary-unit"> 日</span></div>
      <div class="summary-label">出勤日数</div>
    </div>
    <div class="summary-card">
      <div id="totalHoursDisp" style="font-size:24px;font-weight:700;color:#007aff;">--</div>
      <div class="summary-label">総勤務時間</div>
    </div>
  </div>
  <div style="background:white;border-radius:14px;padding:14px 18px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,0.06);">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <span style="font-size:13px;color:#3a3a3c;font-weight:600;">🕐 通常勤務（8h以内／日）</span>
      <span id="normalHoursDisp" style="font-size:15px;font-weight:700;color:#34c759;">--</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:13px;color:#3a3a3c;font-weight:600;">⏰ 残業（8h超／×1.25）</span>
      <span id="overtimeHoursDisp" style="font-size:15px;font-weight:700;color:#ff9500;">--</span>
    </div>
  </div>

  <button onclick="openNewRecord()"
    style="width:100%;padding:14px;background:#34c759;color:white;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:16px;">
    ➕ 過去の打刻を追加（忘れた日）
  </button>

  <div id="recordList"></div>

  <div class="section-label">エクスポート</div>
  <button class="export-btn export-invoice" onclick="exportInvoice()">📋 今月の日報をコピー（請求書用）</button>
  <button class="export-btn export-json"    onclick="exportJSON()">💾 全データを保存（Claude Code用）</button>

  <div class="section-label">インポート</div>
  <button class="export-btn" style="background:#ff9500;" onclick="openImport()">📥 過去データを読み込む</button>

  <!-- Past record edit modal -->
  <div class="modal-overlay" id="editRecordModal">
    <div class="modal-sheet">
      <div class="modal-title" id="editModalTitle">✏️ 記録を編集</div>

      <div class="edit-field-label">📅 日付</div>
      <input type="date" class="time-input" id="editDate" style="font-size:20px;margin-bottom:0;">

      <div class="edit-field-label">🟢 出勤時刻</div>
      <input type="time" class="time-input" id="editInTime" style="font-size:24px;margin-bottom:0;">

      <div class="edit-field-label">🔴 退勤時刻</div>
      <input type="time" class="time-input" id="editOutTime" style="font-size:24px;margin-bottom:0;">

      <div class="edit-field-label">🍱 昼休憩</div>
      <div class="edit-break-toggle">
        <button class="edit-break-btn active" id="editBreakOn"  onclick="setEditBreak(true)">あり（1時間）</button>
        <button class="edit-break-btn"        id="editBreakOff" onclick="setEditBreak(false)">なし</button>
      </div>

      <div class="edit-field-label">📝 日報</div>
      <textarea class="edit-report-textarea" id="editReport"
        placeholder="例：A物件  建具取付  3枚&#10;B物件  棚板加工  5枚"></textarea>

      <div class="modal-btn-row" style="margin-top:16px;">
        <button class="modal-btn modal-btn-cancel" onclick="closeEditRecord()">キャンセル</button>
        <button class="modal-btn modal-btn-ok"     onclick="saveEditRecord()">保存する</button>
      </div>
      <button id="editDeleteBtn"
        style="width:100%;margin-top:10px;padding:14px;background:#ffebe9;color:#ff3b30;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;"
        onclick="deleteEditRecord()">🗑️ この日の記録を削除</button>
    </div>
  </div>

  <!-- Import modal -->
  <div class="modal-overlay" id="importModal">
    <div class="modal-sheet">
      <div class="modal-title">📥 データを読み込む</div>
      <p style="font-size:13px;color:#6e6e73;margin-bottom:14px;">JSONデータを貼り付けてください。既存のデータとマージされます。</p>
      <textarea id="importInput" class="report-textarea" style="min-height:160px;font-size:13px;" placeholder='{"records":[...]}'></textarea>
      <div class="modal-btn-row" style="margin-top:14px;">
        <button class="modal-btn modal-btn-cancel" onclick="closeImport()">キャンセル</button>
        <button class="modal-btn modal-btn-ok"     onclick="confirmImport()">読み込む</button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── Storage ────────────────────────────────────────────────
const KEY = 'yuyucraft_worklog_v1';

function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || {records:[]}; }
  catch { return {records:[]}; }
}

function save(data) {
  localStorage.setItem(KEY, JSON.stringify(data));
}

function todayKey() {
  const d = new Date();
  return [d.getFullYear(), pad(d.getMonth()+1), pad(d.getDate())].join('-');
}

function getRecord(dateKey) {
  return load().records.find(r => r.date === dateKey) || null;
}

function upsert(fields) {
  const data = load();
  const key  = todayKey();
  const idx  = data.records.findIndex(r => r.date === key);
  if (idx >= 0) data.records[idx] = {...data.records[idx], ...fields};
  else           data.records.push({date: key, ...fields});
  save(data);
}

function upsertByDate(dateKey, fields) {
  const data = load();
  const idx  = data.records.findIndex(r => r.date === dateKey);
  if (idx >= 0) data.records[idx] = {...data.records[idx], ...fields};
  else           data.records.push({date: dateKey, ...fields});
  save(data);
}

// ── Helpers ────────────────────────────────────────────────
function pad(n) { return String(n).padStart(2,'0'); }

function fmtTime(ts) {
  if (!ts) return '--:--';
  const d = new Date(ts);
  return pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function fmtHours(inTs, outTs, breakMin) {
  if (!inTs || !outTs) return '--';
  const diff = outTs - inTs - (breakMin || 0) * 60000;
  if (diff <= 0) return '--';
  const h = Math.floor(diff/3600000);
  const m = Math.floor((diff%3600000)/60000);
  return h + 'h' + pad(m) + 'm';
}

const DAYS = ['日','月','火','水','木','金','土'];

function dayLabel(dateStr) {
  return DAYS[new Date(dateStr + 'T00:00:00').getDay()];
}

// ── Clock ──────────────────────────────────────────────────
function updateHeaderTime() {
  const d = new Date();
  document.getElementById('headerTime').textContent = pad(d.getHours()) + ':' + pad(d.getMinutes());
}

// ── Today UI ───────────────────────────────────────────────
let viewMonth; // {year, month} for monthly tab

function refreshToday() {
  const d   = new Date();
  const key = todayKey();
  const rec = getRecord(key);

  // Date label
  document.getElementById('todayDate').textContent =
    (d.getMonth()+1) + '月' + d.getDate() + '日（' + DAYS[d.getDay()] + '）';

  const inTs    = rec?.clockIn  || null;
  const outTs   = rec?.clockOut || null;
  const breakMin = (rec?.breakOff === true) ? 0 : 60; // デフォルト：休憩あり60分

  setTimeDisp('dispIn',    inTs,  !inTs);
  setTimeDisp('dispOut',   outTs, !outTs);
  setTimeDisp('dispHours', null,  !(inTs && outTs), fmtHours(inTs, outTs, breakMin));

  document.getElementById('btnIn').disabled  = !!inTs;
  document.getElementById('btnOut').disabled = !inTs || !!outTs;

  // 休憩トグルの状態を反映
  const hasBreak = !(rec?.breakOff === true);
  document.getElementById('breakOn').classList.toggle('active', hasBreak);
  document.getElementById('breakOff').classList.toggle('active', !hasBreak);

  // Report section
  if (outTs) {
    if (rec?.report) {
      document.getElementById('reportFormCard').style.display  = 'none';
      document.getElementById('reportSavedCard').style.display = 'block';
      document.getElementById('reportSavedText').textContent   = rec.report;
    } else {
      document.getElementById('reportFormCard').style.display  = 'block';
      document.getElementById('reportSavedCard').style.display = 'none';
    }
  } else {
    document.getElementById('reportFormCard').style.display  = 'none';
    document.getElementById('reportSavedCard').style.display = 'none';
  }
}

function setTimeDisp(id, ts, isEmpty, override) {
  const el = document.getElementById(id);
  el.textContent = override || fmtTime(ts);
  el.classList.toggle('empty', isEmpty);
}

// ── Actions ────────────────────────────────────────────────
function clockIn() {
  upsert({clockIn: Date.now()});
  refreshToday();
  toast('✅ 出勤しました！いってらっしゃい');
}

function clockOut() {
  upsert({clockOut: Date.now()});
  refreshToday();
  toast('🏁 退勤打刻しました。お疲れ様です！');
  setTimeout(() => document.getElementById('reportInput').focus(), 400);
}

function saveReport() {
  const text = document.getElementById('reportInput').value.trim();
  if (!text) { toast('⚠️ 作業内容を入力してください'); return; }
  upsert({report: text});
  refreshToday();
  toast('💾 日報を保存しました！');
}

function setBreak(hasBreak) {
  upsert({breakOff: !hasBreak});
  refreshToday();
  toast(hasBreak ? '🍱 昼休憩あり（1時間）に設定しました' : '💪 昼休憩なしに設定しました');
}

function editReport() {
  const rec = getRecord(todayKey());
  document.getElementById('reportInput').value = rec?.report || '';
  document.getElementById('reportSavedCard').style.display = 'none';
  document.getElementById('reportFormCard').style.display  = 'block';
}

// ── Time picker ────────────────────────────────────────────
let timePickerTarget = null; // 'in' or 'out'

function openTimePicker(target) {
  timePickerTarget = target;
  const rec = getRecord(todayKey());
  const now = new Date();

  // 現在記録されている時刻があればそれをセット、なければ現在時刻
  let defaultTime;
  if (target === 'in' && rec?.clockIn) {
    const d = new Date(rec.clockIn);
    defaultTime = pad(d.getHours()) + ':' + pad(d.getMinutes());
  } else if (target === 'out' && rec?.clockOut) {
    const d = new Date(rec.clockOut);
    defaultTime = pad(d.getHours()) + ':' + pad(d.getMinutes());
  } else {
    defaultTime = pad(now.getHours()) + ':' + pad(now.getMinutes());
  }

  document.getElementById('modalTitle').textContent =
    target === 'in' ? '🟢 出勤時刻を設定' : '🔴 退勤時刻を設定';
  document.getElementById('timePickerInput').value = defaultTime;
  document.getElementById('timeModal').classList.add('show');
}

function closeTimePicker() {
  document.getElementById('timeModal').classList.remove('show');
  timePickerTarget = null;
}

function confirmTimePicker() {
  const val = document.getElementById('timePickerInput').value;
  if (!val) { toast('⚠️ 時刻を入力してください'); return; }

  const [h, m] = val.split(':').map(Number);
  const today  = new Date();
  today.setHours(h, m, 0, 0);
  const ts = today.getTime();

  const rec = getRecord(todayKey());

  if (timePickerTarget === 'in') {
    // 退勤より後にはできない
    if (rec?.clockOut && ts >= rec.clockOut) {
      toast('⚠️ 出勤時刻は退勤より前にしてください'); return;
    }
    upsert({clockIn: ts});
    toast('✅ 出勤時刻を ' + val + ' に設定しました');
  } else {
    // 出勤より前にはできない
    if (rec?.clockIn && ts <= rec.clockIn) {
      toast('⚠️ 退勤時刻は出勤より後にしてください'); return;
    }
    upsert({clockOut: ts});
    toast('🏁 退勤時刻を ' + val + ' に設定しました');
  }

  closeTimePicker();
  refreshToday();
  // 退勤を設定した場合、日報欄を表示
  if (timePickerTarget === 'out') {
    const updated = getRecord(todayKey());
    if (!updated?.report) {
      document.getElementById('reportFormCard').style.display = 'block';
    }
  }
}

// ── Tab switch ─────────────────────────────────────────────
function switchTab(tab) {
  ['today','monthly'].forEach(t => {
    document.getElementById('page-'+t).classList.toggle('active', t === tab);
  });
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('active', (i===0 && tab==='today') || (i===1 && tab==='monthly'));
  });
  if (tab === 'monthly') refreshMonthly();
}

// ── Monthly ────────────────────────────────────────────────
function changeMonth(delta) {
  viewMonth.month += delta;
  if (viewMonth.month > 12) { viewMonth.month = 1;  viewMonth.year++; }
  if (viewMonth.month < 1)  { viewMonth.month = 12; viewMonth.year--; }
  refreshMonthly();
}

// 勤務時間をミリ秒で返す（通常・残業に分解）
// 1日単位で15分未満切り捨て → 残業は8h超の分
const NORMAL_LIMIT_MS = 8 * 3600000; // 8時間
const UNIT_MS         = 15 * 60000;  // 15分単位

function calcWorkMs(r) {
  if (!r.clockIn || !r.clockOut) return { totalMs: 0, normalMs: 0, overtimeMs: 0 };
  const breakMs = (r.breakOff === true) ? 0 : 60 * 60000;
  const rawMs   = Math.max(0, r.clockOut - r.clockIn - breakMs);
  // 1日単位で15分未満切り捨て
  const totalMs    = Math.floor(rawMs / UNIT_MS) * UNIT_MS;
  const normalMs   = Math.min(totalMs, NORMAL_LIMIT_MS);
  const overtimeMs = Math.max(0, totalMs - NORMAL_LIMIT_MS);
  return { totalMs, normalMs, overtimeMs };
}

// ミリ秒 → "Xh YYm" 表示
function fmtMs(ms) {
  if (ms <= 0) return '0h00m';
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  return h + 'h' + pad(m) + 'm';
}

function refreshMonthly() {
  const {year, month} = viewMonth;
  const prefix = year + '-' + pad(month);
  document.getElementById('monthLabel').textContent = year + '年' + month + '月';

  const data = load();
  const recs = data.records
    .filter(r => r.date.startsWith(prefix))
    .sort((a,b) => b.date.localeCompare(a.date));

  const done = recs.filter(r => r.clockIn && r.clockOut);
  document.getElementById('totalDays').textContent = done.length;

  // 合計計算
  let totalMs = 0, normalMs = 0, overtimeMs = 0;
  done.forEach(r => {
    const c = calcWorkMs(r);
    totalMs    += c.totalMs;
    normalMs   += c.normalMs;
    overtimeMs += c.overtimeMs;
  });

  document.getElementById('totalHoursDisp').textContent   = fmtMs(totalMs);
  document.getElementById('normalHoursDisp').textContent  = fmtMs(normalMs);
  document.getElementById('overtimeHoursDisp').textContent = overtimeMs > 0
    ? fmtMs(overtimeMs)
    : '0h00m';

  const list = document.getElementById('recordList');
  if (!recs.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">この月の記録はありません</div></div>`;
    return;
  }

  list.innerHTML = recs.map(r => {
    const breakMin   = (r.breakOff === true) ? 0 : 60;
    const breakLabel = (r.breakOff === true) ? '休憩なし' : '休憩1h';
    const c = calcWorkMs(r);
    const overtimeBadge = c.overtimeMs > 0
      ? `<span style="font-size:11px;color:#ff9500;font-weight:700;margin-left:6px;">残業 ${fmtMs(c.overtimeMs)}</span>`
      : '';
    return `
    <div class="record-item">
      <div class="record-header">
        <div class="record-date">${r.date.slice(5).replace('-','/')}（${dayLabel(r.date)}）</div>
        <div class="record-hours">
          ${fmtMs(c.totalMs)}
          <span style="font-size:11px;color:#aeaeb2;margin-left:4px;">${breakLabel}</span>
          ${overtimeBadge}
        </div>
      </div>
      <div class="record-times">${fmtTime(r.clockIn)} → ${fmtTime(r.clockOut)}</div>
      ${r.report
        ? `<div class="record-report">${r.report}</div>`
        : `<div class="no-report">⚠️ 日報未入力</div>`}
      <button class="record-edit-btn" onclick="openEditRecord('${r.date}')">✏️ 編集</button>
    </div>
  `}).join('');
}

// ── Past record edit ───────────────────────────────────────
let editingDateKey = null;
let editBreakHas   = true; // true = あり

function openEditRecord(dateKey) {
  editingDateKey = dateKey;
  const rec = getRecord(dateKey);

  // タイトル
  const d = new Date(dateKey + 'T00:00:00');
  const label = (d.getMonth()+1) + '月' + d.getDate() + '日（' + DAYS[d.getDay()] + '）';
  document.getElementById('editModalTitle').textContent = '✏️ ' + label + ' を編集';

  // 日付
  document.getElementById('editDate').value = dateKey;

  // 出勤時刻
  if (rec?.clockIn) {
    const ci = new Date(rec.clockIn);
    document.getElementById('editInTime').value = pad(ci.getHours()) + ':' + pad(ci.getMinutes());
  } else {
    document.getElementById('editInTime').value = '';
  }

  // 退勤時刻
  if (rec?.clockOut) {
    const co = new Date(rec.clockOut);
    document.getElementById('editOutTime').value = pad(co.getHours()) + ':' + pad(co.getMinutes());
  } else {
    document.getElementById('editOutTime').value = '';
  }

  // 休憩トグル
  editBreakHas = !(rec?.breakOff === true);
  updateEditBreakUI();

  // 日報
  document.getElementById('editReport').value = rec?.report || '';

  // 削除ボタンを表示
  document.getElementById('editDeleteBtn').style.display = 'block';

  document.getElementById('editRecordModal').classList.add('show');
}

function openNewRecord() {
  editingDateKey = null; // null = 新規モード
  document.getElementById('editModalTitle').textContent = '➕ 過去の打刻を追加';

  // デフォルトは昨日の日付
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const ykey = [yesterday.getFullYear(), pad(yesterday.getMonth()+1), pad(yesterday.getDate())].join('-');
  document.getElementById('editDate').value = ykey;

  // デフォルト値
  document.getElementById('editInTime').value  = '08:00';
  document.getElementById('editOutTime').value = '17:00';
  document.getElementById('editReport').value  = '';
  editBreakHas = true;
  updateEditBreakUI();

  // 削除ボタンを非表示
  document.getElementById('editDeleteBtn').style.display = 'none';

  document.getElementById('editRecordModal').classList.add('show');
}

function setEditBreak(hasBreak) {
  editBreakHas = hasBreak;
  updateEditBreakUI();
}

function updateEditBreakUI() {
  document.getElementById('editBreakOn').classList.toggle('active', editBreakHas);
  document.getElementById('editBreakOff').classList.toggle('active', !editBreakHas);
}

function closeEditRecord() {
  document.getElementById('editRecordModal').classList.remove('show');
  editingDateKey = null;
}

function saveEditRecord() {
  const newDate = document.getElementById('editDate').value;
  if (!newDate) { toast('⚠️ 日付を入力してください'); return; }

  const inVal  = document.getElementById('editInTime').value;
  const outVal = document.getElementById('editOutTime').value;

  let clockIn  = null;
  let clockOut = null;

  if (inVal) {
    const [h, m] = inVal.split(':').map(Number);
    const d = new Date(newDate + 'T00:00:00');
    d.setHours(h, m, 0, 0);
    clockIn = d.getTime();
  }

  if (outVal) {
    const [h, m] = outVal.split(':').map(Number);
    const d = new Date(newDate + 'T00:00:00');
    d.setHours(h, m, 0, 0);
    clockOut = d.getTime();
  }

  // バリデーション
  if (clockIn && clockOut && clockOut <= clockIn) {
    toast('⚠️ 退勤時刻は出勤より後にしてください');
    return;
  }

  const report = document.getElementById('editReport').value.trim();

  // 日付変更時の重複チェック（自分自身以外）
  if (newDate !== editingDateKey) {
    const data = load();
    const conflict = data.records.find(r => r.date === newDate);
    if (conflict) {
      if (!confirm(newDate + ' には既に記録があります。上書きしますか？')) return;
      // 既存の同日付レコードを削除
      data.records = data.records.filter(r => r.date !== newDate);
      save(data);
    }
    // 元のレコード（編集モードの場合）も削除
    if (editingDateKey) {
      const d2 = load();
      d2.records = d2.records.filter(r => r.date !== editingDateKey);
      save(d2);
    }
  }

  const fields = {breakOff: !editBreakHas};
  if (clockIn  !== null) fields.clockIn  = clockIn;
  if (clockOut !== null) fields.clockOut = clockOut;
  if (report) fields.report = report;

  upsertByDate(newDate, fields);
  closeEditRecord();
  refreshMonthly();

  // 今日の記録に影響した場合は今日タブも更新
  if (newDate === todayKey() || editingDateKey === todayKey()) refreshToday();

  toast('✅ ' + newDate + ' の記録を保存しました！');
}

function deleteEditRecord() {
  if (!editingDateKey) return;
  if (!confirm(editingDateKey + ' の記録を削除しますか？\nこの操作は取り消せません。')) return;

  const data = load();
  data.records = data.records.filter(r => r.date !== editingDateKey);
  save(data);

  closeEditRecord();
  refreshMonthly();
  if (editingDateKey === todayKey()) refreshToday();
  toast('🗑️ 削除しました');
}

// ── Export ─────────────────────────────────────────────────
function exportInvoice() {
  const {year, month} = viewMonth;
  const prefix = year + '-' + pad(month);
  const allRecs = load().records
    .filter(r => r.date.startsWith(prefix) && r.clockIn && r.clockOut)
    .sort((a,b) => a.date.localeCompare(b.date));

  if (!allRecs.length) { toast('⚠️ 記録がありません'); return; }

  // 月次集計
  let totalMs = 0, normalMs = 0, overtimeMs = 0;
  allRecs.forEach(r => {
    const c = calcWorkMs(r);
    totalMs    += c.totalMs;
    normalMs   += c.normalMs;
    overtimeMs += c.overtimeMs;
  });

  const header = [
    '===== ' + year + '年' + month + '月 勤怠サマリー =====',
    '出勤日数　　: ' + allRecs.length + ' 日',
    '総勤務時間　: ' + fmtMs(totalMs),
    '通常時間　　: ' + fmtMs(normalMs) + '（基本単価 × 1.0）',
    '残業時間　　: ' + fmtMs(overtimeMs) + '（基本単価 × 1.25）',
    '',
    '===== 日別明細 =====',
  ].join('\n');

  const detail = allRecs.map(r => {
    const d = r.date.slice(5).replace('-','/');
    const c = calcWorkMs(r);
    const breakLabel = (r.breakOff === true) ? '休憩なし' : '休憩1h';
    const overtimeLine = c.overtimeMs > 0
      ? `  【残業 ${fmtMs(c.overtimeMs)}】`
      : '';
    const workLine = d + '  ' + fmtTime(r.clockIn) + '〜' + fmtTime(r.clockOut)
      + '  ' + fmtMs(c.totalMs) + '（' + breakLabel + '）' + overtimeLine;
    const reportLines = r.report
      ? r.report.split('\n').map(l => '  ' + d + '  ' + l).join('\n')
      : '  ' + d + '  （日報なし）';
    return workLine + '\n' + reportLines;
  }).join('\n');

  copy(header + '\n' + detail);
  toast('📋 勤怠サマリー＋日報をコピーしました！');
}

function exportJSON() {
  const data  = load();
  const json  = JSON.stringify(data, null, 2);
  const {year, month} = viewMonth;
  const fname = 'ゆうゆうクラフト_' + year + '年' + month + '月_出勤記録.json';
  const blob  = new Blob([json], {type:'application/json'});
  const url   = URL.createObjectURL(blob);
  const a     = document.createElement('a');
  a.href      = url;
  a.download  = fname;
  a.click();
  URL.revokeObjectURL(url);
  toast('💾 ' + fname + ' を保存しました');
}

function copy(text) {
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text);
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  }
}

// ── Toast ──────────────────────────────────────────────────
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ── Import ─────────────────────────────────────────────────
function openImport() {
  document.getElementById('importInput').value = '';
  document.getElementById('importModal').classList.add('show');
}

function closeImport() {
  document.getElementById('importModal').classList.remove('show');
}

function confirmImport() {
  const raw = document.getElementById('importInput').value.trim();
  if (!raw) { toast('⚠️ データを貼り付けてください'); return; }
  let incoming;
  try { incoming = JSON.parse(raw); } catch(e) { toast('⚠️ データの形式が正しくありません'); return; }
  if (!Array.isArray(incoming.records)) { toast('⚠️ recordsが見つかりません'); return; }

  const existing = load();
  const merged   = [...incoming.records];
  existing.records.forEach(r => {
    if (!merged.find(m => m.date === r.date)) merged.push(r);
  });
  merged.sort((a,b) => a.date.localeCompare(b.date));
  save({records: merged});

  closeImport();
  refreshMonthly();
  toast('✅ ' + incoming.records.length + '件のデータを読み込みました！');
}

// ── Service Worker & Auto Update ───────────────────────────
let swReg = null;

function applyUpdate() {
  if (swReg?.waiting) {
    swReg.waiting.postMessage('SKIP_WAITING');
  }
  window.location.reload();
}

function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.register('./sw.js').then(reg => {
    swReg = reg;
    // 新しいSWが待機中なら即バナー表示
    if (reg.waiting) {
      document.getElementById('updateBanner').classList.add('show');
    }
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      newSW.addEventListener('statechange', () => {
        if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
          document.getElementById('updateBanner').classList.add('show');
        }
      });
    });
  });
  // SW切り替わったら自動リロード
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    window.location.reload();
  });
}

// ── Init ───────────────────────────────────────────────────
(function init() {
  const now  = new Date();
  viewMonth  = {year: now.getFullYear(), month: now.getMonth()+1};
  refreshToday();
  updateHeaderTime();
  setInterval(updateHeaderTime, 15000);
  registerSW();
})();
</script>
